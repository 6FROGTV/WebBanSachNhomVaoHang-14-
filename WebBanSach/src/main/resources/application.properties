# ==========================================
# 1. CẤU HÌNH KẾT NỐI DATABASE (MySQL)
# ==========================================
spring.datasource.url=jdbc:mysql://localhost:3306/bookstore_db?createDatabaseIfNotExist=true&useUnicode=true&characterEncoding=UTF-8
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ==========================================
# 2. CẤU HÌNH HIBERNATE & JPA
# ==========================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# ==========================================
# 3. CẤU HÌNH GOOGLE OAUTH2 (ĐĂNG NHẬP GOOGLE)
# ==========================================
spring.security.oauth2.client.registration.google.client-id=705142364549-31cv19o5tvj45f0qsq3dsk17r9gnj8kl.apps.googleusercontent.com

# BẠN XÓA CHỮ "REPLACE_THIS_WITH_YOUR_ACTUAL_SECRET" VÀ DÁN MÃ SECRET CỦA BẠN VÀO (GIỮ LẠI CHỮ GOCSPX-)
spring.security.oauth2.client.registration.google.client-secret=MY_SECRET_KEY

spring.security.oauth2.client.registration.google.scope=email,profile