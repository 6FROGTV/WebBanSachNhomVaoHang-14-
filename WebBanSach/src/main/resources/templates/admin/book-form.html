<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" layout:decorate="~{layout}">
<head><title>Cập nhật Sách - Admin</title></head>
<body>
    <section layout:fragment="content" class="container mt-4 mb-5">
        <h3 class="fw-bold text-primary mb-4" th:text="${book.id == null ? 'Thêm Sách Mới' : 'Chỉnh Sửa Sách'}"></h3>
        
        <div class="card shadow-sm border-0">
            <div class="card-body">
                <form th:action="@{/admin/books/save}" th:object="${book}" method="post" enctype="multipart/form-data">
                    <input type="hidden" th:field="*{id}" />
                    <input type="hidden" th:field="*{imageUrl}" />

                    <input type="hidden" id="hiddenCategoryId" th:value="${book.category?.id}" />

                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label fw-bold">Tựa sách</label>
                            <input type="text" class="form-control" th:field="*{title}" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-bold">Tác giả</label>
                            <input type="text" class="form-control" th:field="*{author}" required>
                        </div>
                        
                        <div class="col-md-3">
                            <label class="form-label fw-bold">Danh mục</label>
                            <select class="form-select" id="apiCategorySelect" name="category.id" required>
                                <option value="">-- Đang tải danh mục... --</option>
                            </select>
                        </div>
                        <div class="col-md-3">
                            <label class="form-label fw-bold">Giá bán (VNĐ)</label>
                            <input type="number" class="form-control" th:field="*{price}" required>
                        </div>
                        <div class="col-md-3">
                            <label class="form-label fw-bold">Giảm giá (%)</label>
                            <input type="number" class="form-control" th:field="*{discountPercent}" min="0" max="40" placeholder="0 - 40%">
                        </div>
                        <div class="col-md-3">
                            <label class="form-label fw-bold">Số lượng tồn kho</label>
                            <input type="number" class="form-control" th:field="*{stock}" required>
                        </div>

                        <div class="col-12">
                            <label class="form-label fw-bold">Chọn Ảnh Bìa (Từ máy tính)</label>
                            <input type="file" class="form-control" name="imageFile" accept="image/png, image/jpeg, image/webp">
                            <small class="text-muted">Bỏ trống nếu không muốn thay đổi ảnh (khi sửa sách).</small>
                        </div>
                        
                        <div class="col-12">
                            <label class="form-label fw-bold">Mô tả sách</label>
                            <textarea class="form-control" th:field="*{description}" rows="4"></textarea>
                        </div>
                        <div class="col-12 mt-4 text-end">
                            <a th:href="@{/admin/books}" class="btn btn-secondary">Hủy bỏ</a>
                            <button type="submit" class="btn btn-primary"><i class="bi bi-save"></i> Lưu dữ liệu</button>
                        </div>
                    </div>
                </form>
            </div>
        </div>

        <script>
            document.addEventListener("DOMContentLoaded", function() {
                const hiddenInput = document.getElementById('hiddenCategoryId');
                const hiddenCatId = hiddenInput ? hiddenInput.value : '';
                const select = document.getElementById('apiCategorySelect');

                // Đổi sang dùng API gốc này để đảm bảo dữ liệu luôn được fetch thành công
                fetch('/api/categories')
                    .then(res => {
                        if(!res.ok) throw new Error("Lỗi mạng khi tải API");
                        return res.json();
                    })
                    .then(data => {
                        select.innerHTML = '<option value="">-- Chọn danh mục --</option>';
                        data.forEach(cat => {
                            let opt = document.createElement('option');
                            opt.value = cat.id;
                            opt.textContent = cat.name;
                            
                            // Nếu đang ở trang Sửa sách, tự động chọn đúng danh mục cũ
                            if(hiddenCatId && cat.id == hiddenCatId) {
                                opt.selected = true;
                            }
                            select.appendChild(opt);
                        });
                    })
                    .catch(err => {
                        console.error('Lỗi tải API Danh mục:', err);
                        select.innerHTML = '<option value="">-- Lỗi tải danh mục --</option>';
                    });
            });
        </script>
    </section>
</body>
</html>
