<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" layout:decorate="~{layout}">
<head><title>Cập nhật Danh mục - Admin</title></head>
<body>
    <section layout:fragment="content" class="container mt-4 mb-5">
        <h3 class="fw-bold text-warning mb-4" th:text="${category.id == null ? 'Thêm Danh mục' : 'Sửa Danh mục'}"></h3>
        <div class="card shadow-sm border-0" style="max-width: 600px;">
            <div class="card-body">
                <form th:action="@{/admin/categories/save}" th:object="${category}" method="post">
                    <input type="hidden" th:field="*{id}">
                    <div class="mb-3">
                        <label class="form-label fw-bold">Tên danh mục</label>
                        <input type="text" class="form-control" th:field="*{name}" required>
                    </div>
                    <div class="text-end mt-4">
                        <a th:href="@{/admin/categories}" class="btn btn-secondary">Hủy bỏ</a>
                        <button type="submit" class="btn btn-warning text-white fw-bold"><i class="bi bi-save"></i> Lưu dữ liệu</button>
                    </div>
                </form>
            </div>
        </div>
    </section>
</body>
</html>
