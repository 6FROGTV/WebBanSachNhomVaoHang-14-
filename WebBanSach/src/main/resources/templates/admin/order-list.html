<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" layout:decorate="~{layout}">
<head><title>Quản lý Đơn hàng - Admin</title></head>
<body>
    <section layout:fragment="content" class="container mt-4 mb-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h3 class="fw-bold text-success m-0"><i class="bi bi-box-seam"></i> Quản lý Đơn hàng</h3>
        </div>

        <div class="card shadow-sm border-0">
            <div class="card-body p-0 table-responsive">
                <table class="table table-hover table-striped m-0 align-middle">
                    <thead class="table-dark">
                        <tr>
                            <th>Mã ĐH</th>
                            <th>Khách hàng</th>
                            <th>Ngày đặt</th>
                            <th>Tổng tiền</th>
                            <th>Thanh toán</th>
                            <th>Trạng thái (Cập nhật tự động qua API)</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="order : ${orders}">
                            <td class="fw-bold" th:text="'#ORD-' + ${order.id}">#ORD-001</td>
                            <td th:text="${order.user != null ? order.user.username : 'Khách vãng lai'}">Nguyễn Văn A</td>
                            <td th:text="${#temporals.format(order.createdAt, 'dd/MM/yyyy HH:mm')}">01/01/2026</td>
                            <td class="fw-bold text-danger" th:text="${#numbers.formatDecimal(order.totalAmount, 0, 'COMMA', 0, 'POINT')} + ' ₫'">0 ₫</td>
                            <td th:text="${order.paymentMethod}">COD</td>
                            <td>
                                <select class="form-select form-select-sm" style="width: 160px;" 
                                        th:onchange="'updateOrderStatusApi(' + ${order.id} + ', this.value)'">
                                    <option value="Chờ xác nhận" th:selected="${order.status == 'Chờ xác nhận'}">Chờ xác nhận</option>
                                    <option value="Đang giao hàng" th:selected="${order.status == 'Đang giao hàng'}">Đang giao hàng</option>
                                    <option value="Đã hoàn thành" th:selected="${order.status == 'Đã hoàn thành'}">Đã hoàn thành</option>
                                    <option value="Đã hủy" th:selected="${order.status == 'Đã hủy'}">Đã hủy</option>
                                </select>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(orders)}">
                            <td colspan="6" class="text-center py-4 text-muted">Chưa có đơn hàng nào.</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <script>
            function updateOrderStatusApi(orderId, newStatus) {
                // Fetch toàn bộ thông tin order cũ để gửi đè lên (để không bị mất thông tin cũ)
                fetch('/api/admin/orders')
                    .then(res => res.json())
                    .then(orders => {
                        let order = orders.find(o => o.id == orderId);
                        order.status = newStatus;

                        // Gọi PUT qua API để sửa trạng thái
                        fetch('/api/admin/orders/' + orderId, {
                            method: 'PUT',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(order)
                        })
                        .then(response => {
                            if(response.ok) {
                                alert("Đã cập nhật trạng thái đơn hàng qua API thành công!");
                            }
                        });
                    });
            }
        </script>
    </section>
</body>
</html>
