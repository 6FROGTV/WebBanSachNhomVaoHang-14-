<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" layout:decorate="~{layout}">
<head>
    <title>Thống kê doanh thu - Admin</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <section layout:fragment="content" class="container mt-4 mb-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h3 class="fw-bold text-info m-0"><i class="bi bi-bar-chart-line-fill"></i> Thống kê doanh thu theo tháng</h3>
            <a th:href="@{/admin}" class="btn btn-outline-secondary"><i class="bi bi-arrow-left"></i> Quay lại Admin</a>
        </div>
        
        <div class="row g-4 mb-4">
            <div class="col-md-6">
                <div class="card shadow-sm border-0 bg-white rounded-4 p-4">
                    <h6 class="text-muted fw-bold mb-2">TỔNG SỐ ĐƠN HÀNG HỢP LỆ</h6>
                    <h2 id="apiTotalOrders" class="fw-bold text-danger m-0">Đang tải...</h2>
                </div>
            </div>
            <div class="col-md-6">
                <div class="card shadow-sm border-0 bg-white rounded-4 p-4">
                    <h6 class="text-muted fw-bold mb-2">TỔNG DOANH THU ƯỚC TÍNH</h6>
                    <h2 id="apiTotalRevenue" class="fw-bold text-success m-0">Đang tải...</h2>
                </div>
            </div>
        </div>

        <div class="card shadow-sm border-0 bg-white rounded-4 p-4 mb-5">
            <canvas id="revenueChart" height="400"></canvas>
        </div>

        <script>
            document.addEventListener("DOMContentLoaded", function() {
                // Fetch Data từ API Thống kê
                fetch('/api/admin/revenue-stats')
                    .then(res => res.json())
                    .then(data => {
                        // 1. Cập nhật con số hiển thị
                        document.getElementById('apiTotalOrders').textContent = data.totalValidOrders + " đơn";
                        document.getElementById('apiTotalRevenue').textContent = data.totalRevenue.toLocaleString('vi-VN') + " ₫";

                        // 2. Dùng Mảng 12 tháng từ API để vẽ biểu đồ
                        const monthlyData = data.monthlyRevenue; 
                        
                        const ctx = document.getElementById('revenueChart').getContext('2d');
                        new Chart(ctx, {
                            type: 'bar',
                            data: {
                                labels: ['Tháng 1', 'Tháng 2', 'Tháng 3', 'Tháng 4', 'Tháng 5', 'Tháng 6', 'Tháng 7', 'Tháng 8', 'Tháng 9', 'Tháng 10', 'Tháng 11', 'Tháng 12'],
                                datasets: [{
                                    label: 'Doanh thu (VNĐ)',
                                    data: monthlyData,
                                    backgroundColor: 'rgba(54, 162, 235, 0.7)',
                                    borderColor: 'rgba(54, 162, 235, 1)',
                                    borderWidth: 1,
                                    borderRadius: 4
                                }]
                            },
                            options: {
                                responsive: true,
                                maintainAspectRatio: false,
                                scales: {
                                    y: {
                                        beginAtZero: true,
                                        ticks: {
                                            callback: function(value) {
                                                return value.toLocaleString('vi-VN') + ' ₫'; 
                                            }
                                        }
                                    }
                                },
                                plugins: {
                                    tooltip: {
                                        callbacks: {
                                            label: function(context) {
                                                return context.parsed.y.toLocaleString('vi-VN') + ' ₫'; 
                                            }
                                        }
                                    }
                                }
                            }
                        });
                    })
                    .catch(err => console.error("Lỗi vẽ biểu đồ từ API:", err));
            });
        </script>
    </section>
</body>
</html>
