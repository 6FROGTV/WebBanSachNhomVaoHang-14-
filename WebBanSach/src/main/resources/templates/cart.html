<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" layout:decorate="~{layout}">
<head><title>Giỏ hàng của bạn - Web Bán Sách</title></head>
<body>
    <section layout:fragment="content" class="container mt-5 mb-5">
        <h2 class="brand-font fw-bold text-primary mb-4"><i class="bi bi-cart3"></i> Giỏ hàng của bạn</h2>

        <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show rounded-4 fw-bold shadow-sm" role="alert">
            <i class="bi bi-exclamation-triangle-fill me-2"></i> <span th:text="${errorMessage}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>

        <div th:if="${#lists.isEmpty(cartItems)}" class="text-center py-5 bg-white rounded shadow-sm">
            <i class="bi bi-cart-x text-muted" style="font-size: 4rem;"></i>
            <h4 class="mt-3 text-muted">Giỏ hàng đang trống</h4>
            <p>Bạn chưa thêm sản phẩm nào vào giỏ hàng.</p>
            <a th:href="@{/}" class="btn btn-primary mt-2">Tiếp tục mua sắm</a>
        </div>

        <div th:unless="${#lists.isEmpty(cartItems)}" class="row">
            <div class="col-lg-8">
                <div class="card border-0 shadow-sm rounded-4 mb-4">
                    <div class="card-body p-0">
                        <table class="table table-hover align-middle mb-0">
                            <thead class="table-light">
                                <tr>
                                    <th scope="col" class="ps-4">Sản phẩm</th>
                                    <th scope="col">Đơn giá</th>
                                    <th scope="col" width="150">Số lượng</th>
                                    <th scope="col" class="text-end pe-4">Thành tiền</th>
                                    <th></th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="item : ${cartItems}">
                                    <td class="ps-4 py-3 d-flex align-items-center gap-3">
                                        <img th:src="${item.imageUrl}" class="rounded shadow-sm" style="width: 60px; height: 85px; object-fit: cover;">
                                        <span class="fw-bold text-primary" th:text="${item.title}">Tên sách</span>
                                    </td>
                                    <td class="fw-bold text-muted" th:text="${#numbers.formatDecimal(item.price, 0, 'COMMA', 0, 'POINT')} + ' ₫'">0 ₫</td>
                                    <td>
                                        <form th:action="@{/cart/update}" method="post" class="d-flex">
                                            <input type="hidden" name="bookId" th:value="${item.bookId}">
                                            <input type="number" name="quantity" th:value="${item.quantity}" min="1" class="form-control text-center fw-bold" style="width: 80px;" onchange="this.form.submit()">
                                        </form>
                                    </td>
                                    <td class="text-end pe-4 fw-bold text-danger fs-5" th:text="${#numbers.formatDecimal(item.getSubtotal(), 0, 'COMMA', 0, 'POINT')} + ' ₫'">0 ₫</td>
                                    <td class="text-center">
                                        <a th:href="@{/cart/remove/{id}(id=${item.bookId})}" class="text-danger" title="Xóa món này"><i class="bi bi-trash fs-5"></i></a>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>

            <div class="col-lg-4">
                <div class="card border-0 shadow-sm rounded-4 p-4">
                    <h4 class="fw-bold mb-4 border-bottom pb-2">Tóm tắt đơn hàng</h4>
                    <div class="d-flex justify-content-between mb-3">
                        <span class="text-muted">Tổng phụ:</span>
                        <span class="fw-bold" th:text="${#numbers.formatDecimal(totalPrice, 0, 'COMMA', 0, 'POINT')} + ' ₫'">0 ₫</span>
                    </div>
                    <div class="d-flex justify-content-between mb-3">
                        <span class="text-muted">Phí vận chuyển:</span>
                        <span class="fw-bold text-success">Miễn phí</span>
                    </div>
                    <hr>
                    <div class="d-flex justify-content-between mb-4">
                        <span class="fw-bold fs-5">TỔNG CỘNG:</span>
                        <span class="fw-bold fs-4 text-danger" th:text="${#numbers.formatDecimal(totalPrice, 0, 'COMMA', 0, 'POINT')} + ' ₫'">0 ₫</span>
                    </div>
                    
                    <a th:href="@{/checkout}" class="btn btn-lg w-100 fw-bold text-white shadow" style="background: var(--accent); border-radius: 8px;">
                        TIẾN HÀNH THANH TOÁN <i class="bi bi-arrow-right"></i>
                    </a>
                    
                    <a th:href="@{/}" class="btn btn-link text-decoration-none w-100 mt-2 text-muted">
                        <i class="bi bi-arrow-left"></i> Tiếp tục mua sách
                    </a>
                </div>
            </div>
        </div>
    </section>
</body>
</html>
