<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" layout:decorate="~{layout}">
<head><title>Thanh toán - Web Bán Sách</title></head>
<body>
    <section layout:fragment="content" class="container mt-5 mb-5">
        <h2 class="fw-bold text-primary mb-4">Thanh toán</h2>
        <form th:action="@{/checkout/process}" th:object="${order}" method="post" class="row g-4">
            <div class="col-lg-7">
                <div class="card border-0 shadow-sm rounded-4 p-4 h-100">
                    <h5 class="fw-bold mb-4">Thông tin giao hàng</h5>
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label fw-bold">Họ tên <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" th:field="*{fullName}" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-bold">Số điện thoại <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" th:field="*{phone}" required>
                        </div>
                        <div class="col-12">
                            <label class="form-label fw-bold">Địa chỉ <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" th:field="*{address}" required>
                        </div>
                        
                        <div class="col-md-6">
                            <label class="form-label fw-bold">Phương thức thanh toán <span class="text-danger">*</span></label>
                            <select class="form-select border-primary fw-bold" th:field="*{paymentMethod}" required>
                                <option value="COD">Thanh toán khi nhận hàng (COD)</option>
                                <option value="MOMO">Thanh toán qua ví MoMo</option>
                                <option value="MBBANK">Thanh toán qua MB Bank</option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-bold">Ghi chú</label>
                            <input type="text" class="form-control" th:field="*{note}">
                        </div>
                    </div>
                    <div class="d-flex align-items-center mt-5 gap-3">
                        <a th:href="@{/cart}" class="btn btn-outline-danger px-4 rounded-pill fw-bold">Quay lại</a>
                        <button type="submit" class="btn btn-danger px-5 rounded-pill fw-bold shadow w-100">Xác nhận đặt hàng</button>
                    </div>
                </div>
            </div>
            <div class="col-lg-5">
                <div class="card border-0 shadow-sm rounded-4 p-4 h-100" style="background-color: #f8fafc;">
                    <h5 class="fw-bold mb-4">Đơn hàng của bạn</h5>
                    <div class="d-flex align-items-center mb-3" th:each="item : ${cartItems}">
                        <img th:src="${item.imageUrl}" class="rounded shadow-sm" style="width: 50px; height: 70px; object-fit: cover; margin-right: 15px;">
                        <div class="flex-grow-1">
                            <h6 class="mb-1 fw-bold text-primary" th:text="${item.title}">Tên sách</h6>
                            <small class="text-muted" th:text="'SL: ' + ${item.quantity}">SL: 1</small>
                        </div>
                        <div class="text-end fw-bold text-danger" th:text="${#numbers.formatDecimal(item.getSubtotal(), 0, 'COMMA', 0, 'POINT')} + ' ₫'"></div>
                    </div>
                    <hr class="text-muted my-4">
                    <div class="d-flex justify-content-between align-items-center">
                        <span class="fw-bold fs-5">TỔNG CỘNG</span>
                        <span class="fw-bold fs-3 text-danger" th:text="${#numbers.formatDecimal(totalPrice, 0, 'COMMA', 0, 'POINT')} + ' ₫'"></span>
                    </div>
                </div>
            </div>
        </form>
    </section>
</body>
</html>
