<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" layout:decorate="~{layout}">
<head><title>Thành công - Web Bán Sách</title></head>
<body>
    <section layout:fragment="content" class="container mt-5 mb-5">
        <div class="card border-0 shadow-lg text-center p-5 rounded-4 mx-auto" style="max-width: 600px;">
            <i class="bi bi-check-circle-fill text-success mb-3" style="font-size: 5rem;"></i>
            <h2 class="fw-bold text-success mb-2">Đặt hàng thành công!</h2>
            <p class="text-muted fs-5">Mã đơn hàng: <strong class="text-dark" th:text="'ORD-' + ${orderId}"></strong></p>
            <p class="bg-light p-3 rounded-3 mt-3 text-muted">
                Cảm ơn bạn đã tin tưởng mua sắm. Đơn hàng của bạn đã được hệ thống ghi nhận và sẽ được xử lý trong thời gian sớm nhất!
            </p>
            <a th:href="@{/}" class="btn btn-primary rounded-pill px-5 py-2 mt-3 fw-bold" style="background: var(--accent); border: none;">Tiếp tục mua sắm</a>
        </div>
    </section>
</body>
</html>
